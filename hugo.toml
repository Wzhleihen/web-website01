baseURL = "https://dev.hymsgook.qzz.io/"
locale = "zh-CN"
contentDir = "content"
enableEmoji = true
enableGitInfo = true
defaultContentLanguage = "zh"

[languages]
  [languages.zh]
    title = "我的个人网站"
    label = "中文"
    weight = 10

[module]
  [module.hugoVersion]
    extended = true
    min = "0.140.0"
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 1
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  google_fonts = [
    ["Inter", "300, 400, 600, 700"],
    ["Fira Code", "500, 700"]
  ]
  sans_serif_font = "Inter"
  secondary_font  = "Inter"
  mono_font       = "Fira Code"

  [params.footer]
    copyright = "© :YEAR: 我的个人网站. Built with [**Lotus Docs**](https://github.com/colinwilson/lotusdocs)"

  [params.social]
    github = ""      # 填入你的 GitHub 用户名

  [params.docs]
    title           = "文档"
    themeColor      = "blue"
    darkMode        = true
    prism           = true
    prismTheme      = "solarized-light"

    sidebarIcons    = true
    breadcrumbs     = true
    backToTop       = true

    toc             = true
    tocMobile       = true
    scrollSpy       = true

    descriptions    = true
    titleIcon       = true

    navDesc         = true
    navDescTrunc    = 30
    listDescTrunc   = 100
    intLinkTooltip  = true

  [params.flexsearch]
    enabled = true

[menu]
  [[menu.primary]]
    name       = "文档"
    url        = "docs/"
    identifier = "docs"
    weight     = 10
  [[menu.primary]]
    name       = "博客"
    url        = "blog/"
    identifier = "blog"
    weight     = 20
  [[menu.primary]]
    name       = "关于"
    url        = "about/"
    identifier = "about"
    weight     = 30
